<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reportar — LlaqtaShield</title>

  <!-- FUENTES -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- ESTILOS -->
  <style>
    :root {
      --verde1:#0C5F3A;
      --verde2:#20C06F;
      --verde3:#0F6B3E;
      --crema:#FFF5D8;

      --glass-bg:rgba(255,255,255,0.09);
      --glass-border:rgba(255,255,255,0.16);
      --glass-soft:rgba(255,255,255,0.06);

      --shadow-md:0 5px 22px rgba(0,0,0,0.35);
      --shadow-lg:0 10px 40px rgba(0,0,0,0.55);

      --gradient-btn:linear-gradient(135deg,var(--verde1),var(--verde2));
      --gradient-bg:linear-gradient(160deg,#07110c,#0b1f17,#0f2f23);
    }

    body{
      margin:0;
      background:#0c1411;
      font-family:"Inter",sans-serif;
      color:white;
      overflow-x:hidden;
    }

    /* ==============================
        FONDO ULTRA PRO
     ============================== */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 30%, rgba(32,192,111,0.22), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(12,90,56,0.22), transparent 60%),
        url("data:image/svg+xml,%3Csvg width='180' height='180' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2320c06f' stroke-opacity='0.15' stroke-width='1'%3E%3Cpath d='M90 10 L160 50 L160 130 L90 170 L20 130 L20 50 Z'/%3E%3C/g%3E%3C/svg%3E"),
        var(--gradient-bg);
      background-size:auto, auto, 250px, cover;
      animation:scan 22s linear infinite;
      z-index:-2;
    }

    @keyframes scan{
      0%{background-position: 0 0, 0 0, 0 0, 0 0;}
      100%{background-position: 0 0, 0 0, 0 500px, 0 0;}
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, rgba(32,192,111,0.12), transparent 75%);
      mix-blend-mode:soft-light;
      animation:pulse 6s ease-in-out infinite;
      z-index:-1;
    }

    @keyframes pulse{
      0%{opacity:0.25;}
      50%{opacity:0.55;}
      100%{opacity:0.25;}
    }

    /* ==============================
       ENCABEZADO
    ============================== */
    header.small-header{
      background:var(--glass-bg);
      backdrop-filter:blur(14px);
      padding:22px;
      box-shadow:var(--shadow-md);
      display:flex;
      flex-direction:column;
      gap:6px;
      border-bottom:1px solid var(--glass-border);
    }

    header.small-header a.link{
      text-decoration:none;
      color:var(--verde2);
      font-weight:600;
      transition:0.2s;
    }

    header.small-header a.link:hover{
      color:white;
      text-shadow:0 0 6px var(--verde2);
    }

    /* ==============================
       CONTENEDOR PRINCIPAL
    ============================== */

    main.main.container{
      max-width:720px;
      margin:40px auto;
      padding:0 20px 50px;
    }

    .card{
      background:var(--glass-soft);
      border:1px solid var(--glass-border);
      padding:30px 32px;
      border-radius:22px;
      box-shadow:var(--shadow-lg);
      backdrop-filter:blur(14px);
      display:flex;
      flex-direction:column;
      gap:14px;
      color:#eafff2;
    }

    .card h2{
      margin-bottom:6px;
      font-size:1.7rem;
      font-weight:800;
      color:#d8ffeb;
      text-shadow:0 0 8px rgba(32,192,111,0.2);
    }

    /* ==============================
       FORMULARIO
    ============================== */

    .form label{display:block; margin-top:16px; font-weight:600;}

    .form input[type="text"],
    .form input[type="tel"],
    .form textarea,
    .form input[type="file"]{
      width:100%;
      padding:12px 14px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.1);
      color:white;
      font-size:1rem;
      transition:0.25s;
      box-sizing:border-box;
    }

    /* ==============================
         SELECT ULTRA PRO
    ============================== */
    .form select {
      width:100%;
      padding:12px 14px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(0,0,0,0.35);
      color:#ffffff;
      font-size:1rem;
      transition:0.25s;
      appearance:none;
      backdrop-filter:blur(6px);
    }

    .form select option {
      background:#0d1a16;
      color:#eafff2;
      padding:12px;
      font-size:1rem;
    }

    .form select:focus,
    .form textarea:focus,
    .form input:focus{
      outline:none;
      border-color:var(--verde2);
      box-shadow:0 0 0 3px rgba(32,192,111,0.25);
    }

    .form textarea{
      min-height:110px;
      resize:vertical;
    }

    .form input[type="checkbox"]{
      width:auto;
      margin:0;
    }

    /* ==============================
       BOTONES
    ============================== */

    .btn{
      display:inline-block;
      padding:14px 26px;
      background:var(--gradient-btn);
      color:white;
      border-radius:14px;
      font-weight:700;
      margin-top:16px;
      cursor:pointer;
      border:none;
      transition:0.25s ease;
      box-shadow:var(--shadow-md);
    }

    .btn:hover{
      filter:brightness(1.18);
      transform:translateY(-3px);
    }

    .btn-secondary{
      display:inline-block;
      padding:14px 26px;
      background:rgba(255,255,255,0.15);
      color:white;
      border-radius:14px;
      font-weight:600;
      margin-left:12px;
      transition:0.25s;
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(8px);
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,0.25);
      transform:translateY(-2px);
    }

    #result{
      padding:12px;
      border-radius:12px;
      background:rgba(32,192,111,0.08);
      border:1px solid rgba(32,192,111,0.25);
      font-size:1rem;
      color:white;
      margin-top:14px;
    }

    @media(max-width:520px){
      .card{padding:20px;}
      .btn, .btn-secondary{
        width:100%;
        text-align:center;
        margin-left:0;
        margin-top:10px;
      }
    }
  </style>
</head>

<body>
  <header class="small-header">
    <a href="/" class="link">&larr; Volver al inicio</a>
    <h1>Registro de Alerta Ciudadana</h1>
  </header>

  <main class="main container">
    <div class="card">
      <h2>Formulario de Reporte</h2>
      <p style="color:#c3ffdd">
        Completa los campos y envía la alerta. Se generará automáticamente un documento PDF del reporte.
      </p>

      <form id="reportForm" method="post" action="/report" enctype="multipart/form-data" class="form">
        
        <label for="categoria">Categoría
          <select name="categoria" id="categoria" required>
            {% for c in categories %}
            <option value="{{c}}">{{ c.replace('_',' ') }}</option>
            {% endfor %}
          </select>
        </label>

        <label for="descripcion">Descripción
          <textarea name="descripcion" id="descripcion" required></textarea>
        </label>

        <label for="direccion">Dirección
          <input name="direccion" id="direccion" type="text">
        </label>

        <label for="telefono">Teléfono
          <input name="telefono" id="telefono" type="tel">
        </label>

        <label style="display:flex; gap:10px; align-items:center; margin-top:16px;">
          <input type="checkbox" name="anonimo" id="anonimo"> Enviar anónimo
        </label>

        <label for="imagen">Imagen
          <input type="file" name="imagen" id="imagen" accept="image/*">
        </label>

        <div style="margin-top:20px; display:flex; flex-wrap:wrap;">
          <button type="submit" class="btn">Enviar reporte</button>
          <a class="btn-secondary" href="/">Cancelar</a>
        </div>

        <div id="result"></div>

      </form>
    </div>
  </main>

  <!-- ==============================
       SCRIPT PARA ENVÍO Y PDF
     ============================== -->

  <script>
    (function(){
      const form = document.getElementById('reportForm');
      const result = document.getElementById('result');

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        result.textContent = '⏳ Enviando reporte...';

        const fd = new FormData(form);

        try{
          const res = await fetch('/report', {method:'POST', body: fd});
          const json = await res.json();

          if(res.ok){
            const url = json.document;
            result.innerHTML = `✅ Reporte generado<br>
            <a style="color:#20C06F; font-weight:700;" href="${url}" target="_blank">Abrir PDF</a>`;

            if(url){
              window.open(url, '_blank');
            }

            form.reset();
          } else {
            result.textContent = '⚠ ' + (json.error || 'Error al enviar');
          }

        }catch(err){
          result.textContent = '⚠ Error de red o servidor';
        }
      });
    })();
  </script>

</body>
</html>
